<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>토리펀 (메이플키우기 최종데미지 계산기)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root{
  --blue:#2563eb; --light:#f0f5ff; --line:#c7d2fe;
  --txt:#0f172a; --red:#dc2626;
}
body{margin:0;background:#f5f7fb;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
.container{max-width:900px;margin:20px auto;background:#fff;border-radius:16px;box-shadow:0 10px 25px rgba(0,0,0,.08);padding:18px;}
.header{display:flex;justify-content:space-between;}
.title{font-weight:900;font-size:1.8rem;color:var(--blue);}
.sub{margin-top:4px;color:#374151;font-weight:600;}
.maker{background:linear-gradient(135deg,#2563eb,#60a5fa);color:#fff;padding:6px 12px;border-radius:999px;font-weight:800;}
.section-title{margin-top:18px;font-weight:900;color:var(--blue);}
table{width:100%;border-collapse:collapse;margin-top:10px;font-size:13px;}
th,td{border-bottom:1px solid #e5e7eb;padding:6px;text-align:center;}
th{background:#eef2ff;color:var(--blue);}
input{width:95%;padding:6px;border-radius:6px;border:1px solid #dbeafe;}
.auto{background:#f9fafb;}
.plus{color:#dc2626;font-weight:800;}
.minus{color:#2563eb;font-weight:800;}
</style>
</head>

<body>
<div class="container">

<div class="header">
  <div>
    <div class="title">토리펀</div>
    <div class="sub">메이플키우기 최종 데미지 비교 · 스탯 효율 분석</div>
  </div>
  <div class="maker">스카니아9 히수토리</div>
</div>

<div class="section-title">능력치 입력</div>
<table>
<thead>
<tr><th>항목</th><th>기존</th><th>증감</th><th>신규</th></tr>
</thead>
<tbody id="stats-rows"></tbody>
</table>

<div class="section-title">스탯 효율 분석</div>
<table>
<thead>
<tr><th>항목</th><th>기준</th><th>증가율</th><th>정규화</th></tr>
</thead>
<tbody id="eff-rows"></tbody>
</table>

</div>

<script>
const stats=[
 {key:"atk",label:"공격력"},
 {key:"cr",label:"크확"},
 {key:"cd",label:"크뎀"},
 {key:"as",label:"공속"},
 {key:"stat",label:"스탯비례"},
 {key:"mainFixed",label:"고정 주스탯"},
 {key:"mainPct",label:"주스탯%"},
 {key:"dmg",label:"데미지"},
 {key:"boss",label:"보스"},
 {key:"final",label:"최종 데미지"},
];

function isEffStat(s){ return s.key!=="mainFixed"; }

function createRows(){
 const body=document.getElementById("stats-rows");
 const eff=document.getElementById("eff-rows");

 stats.forEach(s=>{
  body.insertAdjacentHTML("beforeend",`
   <tr>
    <td>${s.label}</td>
    <td><input id="old_${s.key}"></td>
    <td><input id="delta_${s.key}"></td>
    <td><input id="new_${s.key}" class="auto" readonly></td>
   </tr>`);
 });

 stats.forEach(s=>{
  if(!isEffStat(s))return;
  eff.insertAdjacentHTML("beforeend",`
   <tr>
    <td>${s.key==="as"?"공속(1%)":s.label}</td>
    <td>1</td>
    <td id="eff_delta_${s.key}">-</td>
    <td id="eff_norm_${s.key}">-</td>
   </tr>`);
 });
}

function speedGain(S,d){
 const cap=1.5;
 return (1+(S+d*(cap-S)/cap))/(1+S);
}

function recompute(){
 stats.forEach(s=>{
  const o=parseFloat(document.getElementById("old_"+s.key).value)||0;
  const d=parseFloat(document.getElementById("delta_"+s.key).value)||0;
  document.getElementById("new_"+s.key).value=(o+d).toFixed(3);
 });

 const fixed=parseFloat(document.getElementById("new_mainFixed").value)||0;
 const pct=parseFloat(document.getElementById("new_mainPct").value)||0;
 document.getElementById("new_stat").value=(fixed*(1+pct/100)*0.01).toFixed(3);

 analyze();
}

function analyze(){
 const base={};
 stats.forEach(s=>{
  base[s.key]=parseFloat(document.getElementById("new_"+s.key).value)||0;
 });

 stats.forEach(s=>{
  if(!isEffStat(s))return;
  let gain=0;
  if(s.key==="as"){
   gain=(speedGain(base.as/100,0.01)-1)*100;
  }else{
   gain=((base[s.key]+1)/(base[s.key]||1)-1)*100;
  }
  document.getElementById("eff_delta_"+s.key).textContent=gain.toFixed(3)+"%";
  document.getElementById("eff_norm_"+s.key).textContent=gain.toFixed(3)+"% / 1%";
 });
}

document.addEventListener("input",recompute);
createRows();
</script>

</body>
</html>
