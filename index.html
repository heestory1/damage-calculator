<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>토리펀 (메이플키우기 최종데미지 계산기)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root{
  --blue:#2563eb; --light:#f0f5ff; --line:#c7d2fe;
  --txt:#0f172a; --red:#dc2626;
}
body{
  margin:0; background:#f5f7fb;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
.container{
  max-width:900px; margin:20px auto; background:#fff;
  border-radius:16px; box-shadow:0 10px 25px rgba(0,0,0,.08);
  padding:18px;
}
.header{display:flex;justify-content:space-between;gap:10px}
.title{font-size:1.8rem;font-weight:900;color:var(--blue)}
.sub{font-weight:600;color:#374151}
.maker{
  background:linear-gradient(135deg,#2563eb,#60a5fa);
  color:#fff;padding:6px 12px;border-radius:999px;font-weight:800
}
.note{
  background:var(--light);border:1px solid var(--line);
  border-radius:10px;padding:12px;font-size:.9rem;line-height:1.6
}
.section-title{margin-top:18px;font-weight:900;color:var(--blue)}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{border-bottom:1px solid #e5e7eb;padding:6px;text-align:center}
th{background:#eef2ff;color:var(--blue)}
input[type="number"],input[type="text"]{
  width:100%;padding:6px;border-radius:6px;border:1px solid #dbeafe;
}
.auto{background:#f9fafb}
.plus{color:#dc2626;font-weight:800}
.minus{color:#2563eb;font-weight:800}
button{
  padding:6px 10px;border-radius:8px;border:1px solid #cbd5f5;
  background:#fff;color:#2563eb;font-weight:800;cursor:pointer;
}
button.main{
  background:#2563eb;color:#fff;border:none;
}
</style>
</head>

<body>
<div class="container">

<div class="header">
  <div>
    <div class="title">토리펀</div>
    <div class="sub">메이플키우기 최종 데미지 계산기</div>
  </div>
  <div class="maker">스카니아9 히수토리</div>
</div>

<div class="note">
· 증가/감소 칸은 신규 장비로 인한 <b>순수 변화량</b>만 입력<br>
· 모바일에서 마이너스 입력은 <b>± 버튼</b>을 사용하세요
</div>

<div class="section-title">능력치 입력</div>

<div style="overflow-x:auto">
<table>
<thead>
<tr>
<th>항목</th>
<th>기존</th>
<th>증가 / 감소</th>
<th>신규</th>
</tr>
</thead>
<tbody id="stats-rows"></tbody>
</table>
</div>

<br>
<button class="main" onclick="calculate()">최종 데미지 계산</button>

</div>

<script>
const stats=[
{key:"atk",label:"마을 공격력"},
{key:"weapon",label:"무기 착용 및 보유효과(%)"},
{key:"skillAtk",label:"스킬 공격력(%)"},
{key:"cr",label:"크리티컬 확률(%)"},
{key:"cd",label:"크리티컬 데미지(%)"},
{key:"stat",label:"스탯비례 데미지(%)"},
{key:"dmg",label:"데미지(%)"},
{key:"amp",label:"데미지 증폭(%)"},
{key:"skill",label:"스킬 데미지(%)"},
{key:"boss",label:"보스/일반 데미지(%)"},
{key:"min",label:"최소 데미지(%)"},
{key:"max",label:"최대 데미지(%)"},
{key:"final",label:"최종 데미지(%)"}
];

function createStatRows(){
  const tbody=document.getElementById("stats-rows");
  stats.forEach(s=>{
    const tr=document.createElement("tr");

    tr.innerHTML=`<td>${s.label}</td>`;

    const oldTd=document.createElement("td");
    const oldI=document.createElement("input");
    oldI.type="number"; oldI.id="old_"+s.key;
    oldI.oninput=()=>syncFromOld(s.key);
    oldTd.appendChild(oldI); tr.appendChild(oldTd);

    const deltaTd=document.createElement("td");
    const wrap=document.createElement("div");
    wrap.style.display="flex"; wrap.style.gap="6px";

    const btn=document.createElement("button");
    btn.textContent="±";
    btn.onclick=()=>{
      const el=document.getElementById("delta_"+s.key);
      const v=(el.value||"").trim();
      if(!v) return;
      el.value = v.startsWith("-") ? v.slice(1) : "-"+v;
      updateNewFromDelta(s.key);
      colorDelta(el);
    };

    const deltaI=document.createElement("input");
    deltaI.type="text";
    deltaI.inputMode="decimal";
    deltaI.id="delta_"+s.key;
    deltaI.oninput=()=>{
      updateNewFromDelta(s.key);
      colorDelta(deltaI);
    };

    wrap.appendChild(btn); wrap.appendChild(deltaI);
    deltaTd.appendChild(wrap); tr.appendChild(deltaTd);

    const newTd=document.createElement("td");
    const newI=document.createElement("input");
    newI.type="number"; newI.readOnly=true;
    newI.className="auto"; newI.id="new_"+s.key;
    newTd.appendChild(newI); tr.appendChild(newTd);

    tbody.appendChild(tr);
  });
}

function syncFromOld(key){
  const o=document.getElementById("old_"+key).value;
  const d=document.getElementById("delta_"+key).value;
  if(d==="") document.getElementById("new_"+key).value=o;
}

function updateNewFromDelta(key){
  const o=parseFloat(document.getElementById("old_"+key).value)||0;
  const d=parseFloat(document.getElementById("delta_"+key).value)||0;
  document.getElementById("new_"+key).value=(o+d).toFixed(3);
}

function colorDelta(el){
  const v=parseFloat(el.value);
  el.classList.remove("plus","minus");
  if(isNaN(v)||v===0) return;
  el.classList.add(v>0?"plus":"minus");
}

function calcDamage(s){
  const atk=s.atk||0;
  const cr=Math.min(Math.max((s.cr||0)/100,0),1);
  const cd=1+(s.cd||0)/100;
  const avg=((s.min||0)+(s.max||0))/200;
  return atk*
    (1+(s.weapon||0)/100)*
    (1+(s.skillAtk||0)/100)*
    (1+(s.dmg||0)/100)*
    (1+(s.stat||0)/100)*
    (1+(s.amp||0)/100)*
    (1+(s.boss||0)/100)*
    (1+(s.skill||0)/100)*
    avg*
    (cr*cd+(1-cr))*
    (1+(s.final||0)/100);
}

function collect(prefix){
  const o={}; stats.forEach(s=>{
    o[s.key]=parseFloat(document.getElementById(prefix+s.key).value)||0;
  }); return o;
}

function calculate(){
  const old=collect("old_"), neu=collect("new_");
  alert(
    "기존: "+calcDamage(old).toFixed(2)+
    "\n신규: "+calcDamage(neu).toFixed(2)
  );
}

createStatRows();
</script>
</body>
</html>
